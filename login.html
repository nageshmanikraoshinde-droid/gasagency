<!DOCTYPE html>
<html>
<head>
    <title>User Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ===== Header ===== -->
    <header>
        <div class="header-inner">
            <div class="brand">
               
                <h1>gasease</h1>
            </div>
            <nav>
                <a href="index.html">Home</a>
                <a href="contact.html">Contact</a>
                <a href="register.html">Sign Up</a>
                <a href="login.html" class="active btn-nav">Log In</a>
            </nav>
        </div>
    </header>

    <!-- ===== Login Form ===== -->
    <div class="login-container">
        <!-- Left: Form -->
        <div class="login-content">
            <div class="login-card">
                <span class="eyebrow">Welcome Back</span>
                <h2>User Login</h2>
                <p class="subtitle">Sign in to access your account</p>

                <form action="login.php" method="POST">
                    <input type="email" name="email" placeholder="Enter Email ID" required>
                    <input type="password" name="password" placeholder="Enter Password" required>
                    
                    <div class="login-options">
                        <label class="remember-me">
                            <input type="checkbox" name="remember">
                            Remember me
                        </label>
                        <a href="forgot-password.html" class="forgot-link">Forgot Password?</a>
                    </div>

                    <input type="submit" value="Log In">
                </form>

                <!-- Optional Divider -->
                <div class="divider">
                    <span>or continue with</span>
                </div>

                <!-- Optional Social Login -->
                <div class="social-login">
                    <button class="social-btn" type="button">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12.545,10.239v3.821h5.445c-0.712,2.315-2.647,3.972-5.445,3.972c-3.332,0-6.033-2.701-6.033-6.032s2.701-6.032,6.033-6.032c1.498,0,2.866,0.549,3.921,1.453l2.814-2.814C17.503,2.988,15.139,2,12.545,2C7.021,2,2.543,6.477,2.543,12s4.478,10,10.002,10c8.396,0,10.249-7.85,9.426-11.748L12.545,10.239z"/>
                        </svg>
                        Google
                    </button>
                    <button class="social-btn" type="button">
                        <svg viewBox="0 0 24 24" fill="currentColor">
                            <path d="M20.447,20.452h-3.554v-5.569c0-1.328-0.027-3.037-1.852-3.037c-1.853,0-2.136,1.445-2.136,2.939v5.667H9.351V9h3.414v1.561h0.046c0.477-0.9,1.637-1.85,3.37-1.85c3.601,0,4.267,2.37,4.267,5.455v6.286zM5.337,7.433c-1.144,0-2.063-0.926-2.063-2.065c0-1.138,0.92-2.063,2.063-2.063c1.14,0,2.064,0.925,2.064,2.063C7.401,6.507,6.477,7.433,5.337,7.433z M7.119,20.452H3.555V9h3.564V20.452z"/>
                        </svg>
                        GitHub
                    </button>
                </div>

                <div class="login-footer">
                    <p>Don't have an account? <a href="register.html">Register Here</a></p>
                </div>
            </div>
        </div>

        <!-- Right: Illustration -->
        <div class="login-illustration">
            <img src="logo.png" alt="Brand Illustration">
        </div>
    </div>

    <!-- ===== Footer ===== -->
    <footer>
        <p>&copy; 2026 gasease. All rights reserved.</p>
    </footer>

</body>
</html>
